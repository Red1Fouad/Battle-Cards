<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSF1 Enemy Finder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1a202c 0%, #0b0e14 100%);
            color: #e0e6ed;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(26, 31, 41, 0.8);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(79, 209, 197, 0.1);
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            color: #4fd1c5;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .search-box {
            width: 100%;
            padding: 14px 20px;
            border-radius: 8px;
            border: 2px solid #2d3748;
            background: #0b0e14;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: #4fd1c5;
        }
        #results {
            margin-top: 20px;
        }
        .location-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }
        .location-item {
            background: rgba(45, 55, 72, 0.6);
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 6px;
            border-left: 4px solid #4fd1c5;
            transition: transform 0.1s;
        }
        .location-item:hover {
            background: rgba(45, 55, 72, 0.9);
            transform: translateX(4px);
        }
        .enemy-group {
            margin-bottom: 25px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 15px;
        }
        .enemy-title {
            color: #4fd1c5;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .no-results {
            color: #a0aec0;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Enemy Finder</h1>
    <input type="text" id="enemyInput" class="search-box" list="enemyList" placeholder="Enter enemy name (e.g. OctoNinja)...">
    <datalist id="enemyList"></datalist>

    <div id="results">
        <p class="no-results">Start typing to find locations...</p>
    </div>
</div>

<script>
    let enemyData = {};

    // Load the JSON data. Note: Requires a local server to bypass CORS restrictions.
    fetch('enemy_locations.json')
        .then(response => response.json())
        .then(data => {
            enemyData = data;
            const datalist = document.getElementById('enemyList');
            const uniqueEnemies = Object.keys(data).filter(name => isNaN(name));
            uniqueEnemies.sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                datalist.appendChild(option);
            });
        })
        .catch(err => {
            console.error('Failed to load enemy data:', err);
            document.getElementById('results').innerHTML = `
                <div class="no-results" style="color: #feb2b2; background: #2d3748; padding: 20px; border-radius: 8px; border: 1px solid #f56565; text-align: left;">
                    <strong>CORS Error:</strong> Browsers block data fetching when opening files via <code>file://</code>.<br><br>
                    <strong>To Fix:</strong> Run a local server in this folder:<br>
                    <code style="display: block; background: #000; color: #fff; padding: 10px; margin-top: 10px; font-family: monospace;">python -m http.server</code>
                    <br>Then visit <a href="http://localhost:8000" style="color: #4fd1c5;">http://localhost:8000</a> in your browser.
                </div>`;
        });

    document.getElementById('enemyInput').addEventListener('input', (e) => {
        const val = e.target.value.trim();
        const resultsDiv = document.getElementById('results');
        
        if (val === "") {
            resultsDiv.innerHTML = '<p class="no-results">Start typing to find locations...</p>';
            return;
        }

        // Find all keys that contain the search term
        const matches = Object.keys(enemyData).filter(key => 
            key.toLowerCase().includes(val)
        );
        
        if (matches.length > 0) {
            resultsDiv.innerHTML = matches.map(name => `
                <div class="enemy-group">
                    <div class="enemy-title">${name}</div>
                    <ul class="location-list">
                        ${enemyData[name].map(loc => `<li class="location-item">${loc}</li>`).join('')}
                    </ul>
                </div>
            `).join('');
        } else {
            resultsDiv.innerHTML = `<p class="no-results">No enemies found matching "${e.target.value}"</p>`;
        }
    });
</script>

</body>
</html>
