<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSF1 Enemy Finder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #e0e6ed;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1a1f29;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d3748;
        }
        h1 {
            text-align: center;
            color: #4fd1c5;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #2d3748;
            background: #0b0e14;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: #4fd1c5;
        }
        #results {
            margin-top: 20px;
        }
        .location-list {
            list-style: none;
            padding: 0;
        }
        .location-item {
            background: #2d3748;
            margin: 5px 0;
            padding: 10px 15px;
            border-radius: 4px;
            border-left: 4px solid #4fd1c5;
        }
        .no-results {
            color: #a0aec0;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Enemy Finder</h1>
    <input type="text" id="enemyInput" class="search-box" list="enemyList" placeholder="Enter enemy name (e.g. OctoNinja)...">
    <datalist id="enemyList"></datalist>

    <div id="results">
        <p class="no-results">Start typing to find locations...</p>
    </div>
</div>

<script>
    let enemyData = {};

    // Load the JSON data. Note: Requires a local server to bypass CORS restrictions.
    fetch('enemy_locations.json')
        .then(response => response.json())
        .then(data => {
            enemyData = data;
            const datalist = document.getElementById('enemyList');
            const uniqueEnemies = Object.keys(data).filter(name => name !== name.toLowerCase());
            uniqueEnemies.sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                datalist.appendChild(option);
            });
        })
        .catch(err => {
            console.error('Failed to load enemy data:', err);
            document.getElementById('results').innerHTML = `
                <div class="no-results" style="color: #feb2b2; background: #2d3748; padding: 20px; border-radius: 8px; border: 1px solid #f56565; text-align: left;">
                    <strong>CORS Error:</strong> Browsers block data fetching when opening files via <code>file://</code>.<br><br>
                    <strong>To Fix:</strong> Run a local server in this folder:<br>
                    <code style="display: block; background: #000; color: #fff; padding: 10px; margin-top: 10px; font-family: monospace;">python -m http.server</code>
                    <br>Then visit <a href="http://localhost:8000" style="color: #4fd1c5;">http://localhost:8000</a> in your browser.
                </div>`;
        });

    document.getElementById('enemyInput').addEventListener('input', (e) => {
        const val = e.target.value.trim();
        const resultsDiv = document.getElementById('results');
        
        if (enemyData[val]) {
            const locations = enemyData[val];
            resultsDiv.innerHTML = `<h3>Locations for ${val}:</h3>
                <ul class="location-list">
                    ${locations.map(loc => `<li class="location-item">${loc}</li>`).join('')}
                </ul>`;
        } else if (val === "") {
            resultsDiv.innerHTML = '<p class="no-results">Start typing to find locations...</p>';
        }
    });
</script>

</body>
</html>
